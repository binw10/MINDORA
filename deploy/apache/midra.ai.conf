# Apache vhost for MINDORA production.
# Install certificate files outside Git:
#   /etc/ssl/midra.ai/midra.ai_public.crt
#   /etc/ssl/midra.ai/midra.ai_chain.crt
#   /etc/ssl/midra.ai/midra.ai.key

<VirtualHost *:80>
    ServerName midra.ai
    ServerAlias www.midra.ai

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]

    ErrorLog ${APACHE_LOG_DIR}/mindora-error.log
    CustomLog ${APACHE_LOG_DIR}/mindora-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName midra.ai
    ServerAlias www.midra.ai

    SSLEngine On
    SSLCertificateFile /etc/ssl/midra.ai/midra.ai_public.crt
    SSLCertificateKeyFile /etc/ssl/midra.ai/midra.ai.key
    SSLCertificateChainFile /etc/ssl/midra.ai/midra.ai_chain.crt

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCompression Off
    SSLHonorCipherOrder Off

    ProxyPreserveHost On
    ProxyRequests Off
    AllowEncodedSlashes NoDecode

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    Header always set Strict-Transport-Security "max-age=15552000"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    <LocationMatch "^/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    <LocationMatch "\.(?:avif|css|gif|ico|jpe?g|js|png|svg|webp|woff2?)$">
        Header set Cache-Control "public, max-age=604800"
    </LocationMatch>

    AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml

    ProxyPass / http://127.0.0.1:3000/ retry=0 timeout=60
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/mindora-error.log
    CustomLog ${APACHE_LOG_DIR}/mindora-access.log combined
</VirtualHost>
